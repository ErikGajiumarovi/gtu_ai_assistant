<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">GTU AI Assistant architecture overview</title>
  <desc id="desc">Client-server architecture with frontend, backend, application layer, domain layer, infrastructure adapters, database, object storage and LLM services.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 18; }
      .core { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 18; }
      .infra { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 18; }
      .external { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 18; }
      .text { font: 600 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="980" height="420" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" class="text">GTU AI Assistant: client-server architecture</text>

  <rect x="40" y="150" width="145" height="80" class="box"/>
  <text x="112" y="184" text-anchor="middle" class="text">Browser</text>
  <text x="112" y="207" text-anchor="middle" class="small">student UI</text>

  <rect x="235" y="150" width="160" height="80" class="box"/>
  <text x="315" y="182" text-anchor="middle" class="text">Frontend</text>
  <text x="315" y="206" text-anchor="middle" class="small">React + TypeScript</text>

  <rect x="445" y="80" width="190" height="70" class="core"/>
  <text x="540" y="111" text-anchor="middle" class="text">Backend API</text>
  <text x="540" y="133" text-anchor="middle" class="small">Ktor routes + JWT</text>

  <rect x="445" y="175" width="190" height="70" class="core"/>
  <text x="540" y="205" text-anchor="middle" class="text">Use cases</text>
  <text x="540" y="227" text-anchor="middle" class="small">application layer</text>

  <rect x="445" y="270" width="190" height="70" class="core"/>
  <text x="540" y="300" text-anchor="middle" class="text">Domain</text>
  <text x="540" y="322" text-anchor="middle" class="small">models + ports</text>

  <rect x="700" y="50" width="210" height="62" class="infra"/>
  <text x="805" y="77" text-anchor="middle" class="text">PostgreSQL</text>
  <text x="805" y="97" text-anchor="middle" class="small">metadata + pgvector</text>

  <rect x="700" y="136" width="210" height="62" class="infra"/>
  <text x="805" y="164" text-anchor="middle" class="text">MinIO</text>
  <text x="805" y="184" text-anchor="middle" class="small">files + artifacts</text>

  <rect x="700" y="222" width="210" height="62" class="external"/>
  <text x="805" y="250" text-anchor="middle" class="text">Ollama / LLM</text>
  <text x="805" y="270" text-anchor="middle" class="small">generation + embeddings</text>

  <rect x="700" y="308" width="210" height="62" class="external"/>
  <text x="805" y="336" text-anchor="middle" class="text">agent_space</text>
  <text x="805" y="356" text-anchor="middle" class="small">sandboxed tools</text>

  <path d="M185 190 H235" class="line"/>
  <path d="M395 190 C425 190 425 115 445 115" class="line"/>
  <path d="M540 150 V175" class="line"/>
  <path d="M540 245 V270" class="line"/>
  <path d="M635 210 C665 210 665 82 700 82" class="line"/>
  <path d="M635 210 C665 210 665 167 700 167" class="line"/>
  <path d="M635 210 H700" class="line"/>
  <path d="M635 210 C665 210 665 339 700 339" class="line"/>
</svg>
