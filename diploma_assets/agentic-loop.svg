<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">Agentic loop visualization</title>
  <desc id="desc">Loop where the LLM receives a prompt, chooses tools, executes them, observes results and produces the final answer.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:16; }
      .llm { fill:#f5f3ff; stroke:#7c3aed; stroke-width:2; rx:16; }
      .tool { fill:#ecfeff; stroke:#0891b2; stroke-width:2; rx:16; }
      .final { fill:#f0fdf4; stroke:#16a34a; stroke-width:2; rx:16; }
      .text { font:600 16px Arial, sans-serif; fill:#0f172a; }
      .small { font:13px Arial, sans-serif; fill:#334155; }
      .line { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .loop { stroke:#7c3aed; stroke-width:2.5; fill:none; marker-end:url(#arrow); stroke-dasharray:7 6; }
    </style>
  </defs>
  <rect width="980" height="390" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" class="text">Typical agentic loop in GTU AI Assistant</text>

  <rect x="55" y="165" width="145" height="70" class="box"/>
  <text x="128" y="195" text-anchor="middle" class="text">User request</text>
  <text x="128" y="217" text-anchor="middle" class="small">message + sources</text>

  <rect x="250" y="165" width="160" height="70" class="box"/>
  <text x="330" y="194" text-anchor="middle" class="text">Prompt</text>
  <text x="330" y="216" text-anchor="middle" class="small">history + policy</text>

  <rect x="460" y="165" width="160" height="70" class="llm"/>
  <text x="540" y="194" text-anchor="middle" class="text">LLM agent</text>
  <text x="540" y="216" text-anchor="middle" class="small">Koog AIAgent</text>

  <rect x="675" y="75" width="190" height="70" class="tool"/>
  <text x="770" y="104" text-anchor="middle" class="text">Tool calls</text>
  <text x="770" y="126" text-anchor="middle" class="small">GTU / materials / web</text>

  <rect x="675" y="250" width="190" height="70" class="box"/>
  <text x="770" y="279" text-anchor="middle" class="text">Observations</text>
  <text x="770" y="301" text-anchor="middle" class="small">sources + artifacts</text>

  <rect x="705" y="165" width="160" height="70" class="final"/>
  <text x="785" y="194" text-anchor="middle" class="text">Final answer</text>
  <text x="785" y="216" text-anchor="middle" class="small">streamed to UI</text>

  <path d="M200 200 H250" class="line"/>
  <path d="M410 200 H460" class="line"/>
  <path d="M620 190 C650 180 653 140 675 122" class="line"/>
  <path d="M770 145 V250" class="line"/>
  <path d="M675 285 C640 285 628 237 610 220" class="loop"/>
  <path d="M620 205 H705" class="line"/>
  <text x="640" y="332" text-anchor="middle" class="small">Repeat until no more tool calls or max iterations reached</text>
</svg>
