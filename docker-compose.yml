services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gtu-ai-assistant-postgres
    environment:
      POSTGRES_DB: gtu_ai_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gtu_ai_assistant"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: gtu-ai-assistant-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  agent_space:
    build:
      context: services/agent_space
    container_name: gtu-ai-assistant-agent-space
    environment:
      AGENT_SPACE_TOKEN: ${AGENT_SPACE_TOKEN:-dev-agent-space-token}
      AGENT_SPACE_DEFAULT_TIMEOUT_SECONDS: ${AGENT_SPACE_DEFAULT_TIMEOUT_SECONDS:-30}
      AGENT_SPACE_MAX_TIMEOUT_SECONDS: ${AGENT_SPACE_MAX_TIMEOUT_SECONDS:-120}
      AGENT_SPACE_OUTPUT_LIMIT_CHARS: ${AGENT_SPACE_OUTPUT_LIMIT_CHARS:-20000}
      AGENT_SPACE_MAX_ARTIFACT_BYTES: ${AGENT_SPACE_MAX_ARTIFACT_BYTES:-26214400}
    expose:
      - "8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: "1.5"
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"X-Agent-Space-Token: $${AGENT_SPACE_TOKEN}\" http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - agent_space_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gtu-ai-assistant-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      agent_space:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_AI_MODE: openai
      APP_AI_MODEL: gemma4:31b
      APP_RAG_ENABLED: "true"
      APP_CRAWLER_ENABLED: "true"
      APP_RAG_INGEST_ON_STARTUP: "true"
      APP_RAG_MAX_PAGES_PER_RUN: "250"
      APP_EMBEDDING_MODE: hash
      APP_WEB_SEARCH_MODE: direct
      APP_PERSISTENCE_MODE: postgres
      APP_DB_JDBC_URL: jdbc:postgresql://postgres:5432/gtu_ai_assistant
      APP_DB_USERNAME: postgres
      APP_DB_PASSWORD: postgres
      APP_FILE_STORAGE_MODE: minio
      APP_MINIO_ENDPOINT: http://minio:9000
      APP_MINIO_ACCESS_KEY: minioadmin
      APP_MINIO_SECRET_KEY: minioadmin
      APP_MINIO_BUCKET: gtu-ai-assistant-materials
      APP_MINIO_REGION: us-east-1
      APP_MATERIAL_OCR_ENABLED: "true"
      APP_TESSERACT_LANGUAGES: eng+rus
      APP_AGENT_SPACE_BASE_URL: http://agent_space:8080
      APP_AGENT_SPACE_TOKEN: ${AGENT_SPACE_TOKEN:-dev-agent-space-token}
      APP_AGENT_SPACE_TIMEOUT_SECONDS: "30"
      APP_AGENT_SPACE_OUTPUT_LIMIT_CHARS: "20000"
    ports:
      - "8080:8080"
    networks:
      - default
      - agent_space_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gtu-ai-assistant-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  minio_data:

networks:
  default:
  agent_space_network:
