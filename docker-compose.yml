services:
  postgres:
    image: postgres:16-alpine
    container_name: gtu-ai-assistant-postgres
    environment:
      POSTGRES_DB: gtu_ai_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gtu_ai_assistant"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gtu-ai-assistant-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_AI_MODE: openai
      APP_AI_MODEL: gpt-oss:20b
      APP_PERSISTENCE_MODE: postgres
      APP_DB_JDBC_URL: jdbc:postgresql://postgres:5432/gtu_ai_assistant
      APP_DB_USERNAME: postgres
      APP_DB_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gtu-ai-assistant-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
