services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gtu-ai-assistant-postgres
    environment:
      POSTGRES_DB: gtu_ai_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gtu_ai_assistant"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: gtu-ai-assistant-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gtu-ai-assistant-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      APP_AI_MODE: openai
      APP_AI_MODEL: gpt-oss:20b
      APP_RAG_ENABLED: "true"
      APP_CRAWLER_ENABLED: "true"
      APP_RAG_INGEST_ON_STARTUP: "true"
      APP_RAG_MAX_PAGES_PER_RUN: "250"
      APP_EMBEDDING_MODE: hash
      APP_WEB_SEARCH_MODE: direct
      APP_PERSISTENCE_MODE: postgres
      APP_DB_JDBC_URL: jdbc:postgresql://postgres:5432/gtu_ai_assistant
      APP_DB_USERNAME: postgres
      APP_DB_PASSWORD: postgres
      APP_FILE_STORAGE_MODE: minio
      APP_MINIO_ENDPOINT: http://minio:9000
      APP_MINIO_ACCESS_KEY: minioadmin
      APP_MINIO_SECRET_KEY: minioadmin
      APP_MINIO_BUCKET: gtu-ai-assistant-materials
      APP_MINIO_REGION: us-east-1
      APP_MATERIAL_OCR_ENABLED: "true"
      APP_TESSERACT_LANGUAGES: eng+rus
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gtu-ai-assistant-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  minio_data:
